<!--
  Snippet to drop into Prashanthi's registration.html template.
  Shows the webcam UI elements webcam.js expects, inside the registration form.
-->

<form id="registration-form" method="POST" action="/register">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <!-- Webcam capture -->
    <div class="webcam-section">
        <video id="webcam" autoplay></video>
        <canvas id="snapshot" style="display:none;"></canvas>
        <img id="preview" style="display:none; max-width: 300px;">
        <button type="button" id="capture-btn">Capture Photo</button>
    </div>

    <!-- Captured image gets stored here as base64, sent along with the form -->
    <input type="hidden" id="photo_data" name="photo_data">

    <button type="submit">Register</button>
</form>

<script src="{{ url_for('static', filename='js/webcam.js') }}"></script>
