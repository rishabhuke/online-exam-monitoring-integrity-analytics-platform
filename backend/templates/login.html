<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f4068, #162447);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #e4e4e4;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #00adb5;
            background: rgba(255, 255, 255, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #00adb5;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #008f96;
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85em;
            color: #b4bec9;
        }
        .footer-text a {
            color: #00adb5;
            text-decoration: none;
        }
        .message-box {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9em;
            display: none;
        }
        .success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #2deb60;
        }
        .error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #ff5263;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Candidate Login</h2>
    <div id="message" class="message-box"></div>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="Enter email address">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter password">
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="footer-text">
        Don't have an account? <a href="/auth/register">Register here</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const messageDiv = document.getElementById('message');
        messageDiv.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });
            const result = await response.json();

            messageDiv.textContent = result.message;
            messageDiv.style.display = 'block';

            if (response.ok) {
                messageDiv.className = 'message-box success';
                // Store candidate session details in localStorage for simple frontend mock verification
                localStorage.setItem('candidate', JSON.stringify(result.candidate));
            } else {
                messageDiv.className = 'message-box error';
            }
        } catch (err) {
            messageDiv.textContent = 'An unexpected error occurred.';
            messageDiv.className = 'message-box error';
            messageDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
